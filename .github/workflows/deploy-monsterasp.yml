name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FRPAMSystem.API/FRPAMSystem.API.csproj

      - name: Build
        run: dotnet build FRPAMSystem.API/FRPAMSystem.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish FRPAMSystem.API/FRPAMSystem.API.csproj --configuration Release --output publish

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: publish
